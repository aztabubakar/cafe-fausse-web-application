services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: cafe_fausse
      POSTGRES_PASSWORD: cafe_fausse # development only — never reuse in production
      POSTGRES_DB: cafe_fausse
    ports:
      - "5432:5432"
    volumes:
      - cafe_fausse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_fausse -d cafe_fausse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cafe_fausse_postgres_data:
