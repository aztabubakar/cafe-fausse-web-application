databases:
  - name: cafe-fausse-db
    databaseName: cafe_fausse
    user: cafe_fausse
    plan: free

services:
  - type: web
    name: cafe-fausse-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn wsgi:app
    envVars:
      - key: FLASK_APP
        value: wsgi.py
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-fausse-db
          property: connectionString
      # Update this to your GitHub Pages origin (scheme + host, no path)
      # after the frontend is deployed, e.g. https://<username>.github.io
      - key: FRONTEND_ORIGIN
        value: https://aztabubakar.github.io
